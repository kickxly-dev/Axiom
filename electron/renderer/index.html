<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>Axiom</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Custom frameless titlebar ─────────────────────────────────────────── -->
  <header id="titlebar">
    <div id="titlebar-drag">
      <svg id="logo-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <span id="titlebar-title">Axiom</span>
    </div>
    <div id="titlebar-controls">
      <button class="tb-btn" id="btn-minimize" title="Minimize" aria-label="Minimize">
        <svg width="10" height="1" viewBox="0 0 10 1"><line x1="0" y1="0.5" x2="10" y2="0.5" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button class="tb-btn" id="btn-maximize" title="Maximize" aria-label="Maximize">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.75" y="0.75" width="8.5" height="8.5" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="tb-btn" id="btn-close" title="Close" aria-label="Close">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
  </header>

  <!-- App shell ─────────────────────────────────────────────────────────── -->
  <div id="app">

    <!-- Sidebar ──────────────────────────────────────────────────────────── -->
    <aside id="sidebar">
      <div id="sidebar-top">
        <button id="btn-new-chat" class="new-chat-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New chat
        </button>
      </div>

      <nav id="sessions-list" aria-label="Chat sessions">
        <!-- Sessions rendered by app.js -->
      </nav>

      <div id="sidebar-bottom">
        <div id="model-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
          <span id="model-name">phi3:mini</span>
        </div>
      </div>
    </aside>

    <!-- Main panel ───────────────────────────────────────────────────────── -->
    <main id="main">

      <!-- Welcome / empty state ─────────────────────────────────────────── -->
      <div id="welcome" hidden>
        <div id="welcome-inner">
          <svg id="welcome-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          <h1 id="welcome-title">Good to see you.</h1>
          <p id="welcome-sub">Start a conversation — ask anything or use a tool.</p>
          <div id="welcome-chips">
            <button class="chip" data-prompt="What can you do?">What can you do?</button>
            <button class="chip" data-prompt="Write and run Python code to print the first 20 Fibonacci numbers">Run Fibonacci code</button>
            <button class="chip" data-prompt="Run: ls -la ~ and tell me what you see">List my home folder</button>
            <button class="chip" data-prompt="What's the weather in Tokyo right now?">Weather in Tokyo</button>
            <button class="chip" data-prompt="Search the web for the latest AI news today">Latest AI news</button>
            <button class="chip" data-prompt="Show my system info">System info</button>
          </div>
        </div>
      </div>

      <!-- Message thread ────────────────────────────────────────────────── -->
      <div id="thread" hidden>
        <!-- Messages rendered by app.js -->
      </div>

      <!-- Composer ─────────────────────────────────────────────────────── -->
      <div id="composer-wrap">
        <div id="composer">
          <textarea
            id="input"
            placeholder="Message Axiom…"
            rows="1"
            spellcheck="true"
            aria-label="Message input"
          ></textarea>
          <button id="btn-send" disabled aria-label="Send message">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
        <p id="composer-hint">Powered by local Ollama — your data never leaves your machine</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
